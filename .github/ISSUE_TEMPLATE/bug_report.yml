name: 🐛 Bug Report
description: File a structured report to help us reproduce and fix the bug.
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: describe-bug
    attributes:
      label: Bug Description
      description: Provide a clear and concise description of what the bug is.
      placeholder: Describe what happened...
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run '...'
        2. Click on '...'
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Info
      description: OS version, Node version, pnpm version, database setup, etc.
      placeholder: |
        - OS: Windows 11
        - Node: 22.x
        - pnpm: 11.x
  - type: checkboxes
    id: checklists
    attributes:
      label: Checklists
      options:
        - label: I have checked the existing issues and this is not a duplicate.
          required: true
